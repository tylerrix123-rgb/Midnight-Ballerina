<svg viewBox="0 0 400 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1522"/><stop offset="100%" stop-color="#14101a"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="35%">
      <stop offset="0%" stop-color="#F72585" stop-opacity="0.22"/><stop offset="100%" stop-color="#F72585" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="body" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="rgba(255,255,255,0.06)"/><stop offset="30%" stop-color="rgba(255,255,255,0.14)"/>
      <stop offset="70%" stop-color="rgba(255,255,255,0.09)"/><stop offset="100%" stop-color="rgba(255,255,255,0.04)"/>
    </linearGradient>
    <linearGradient id="lid" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8a0830"/><stop offset="50%" stop-color="#F72585"/><stop offset="100%" stop-color="#8a0830"/>
    </linearGradient>
  </defs>
  <rect width="400" height="500" fill="url(#bg)"/>
  <ellipse cx="200" cy="240" rx="120" ry="130" fill="url(#glow)"/>
  <!-- Container body -->
  <rect x="138" y="188" width="124" height="148" rx="10" fill="url(#body)" stroke="rgba(255,255,255,0.1)" stroke-width="1.5"/>
  <!-- Body shine -->
  <rect x="142" y="193" width="8" height="138" rx="4" fill="rgba(255,255,255,0.07)"/>
  <!-- Biohazard ring suggestion -->
  <circle cx="200" cy="270" r="28" fill="none" stroke="rgba(247,37,133,0.25)" stroke-width="2"/>
  <circle cx="200" cy="270" r="14" fill="none" stroke="rgba(247,37,133,0.18)" stroke-width="1.5"/>
  <!-- Simplified hazard symbol -->
  <text x="200" y="277" text-anchor="middle" font-family="Arial" font-size="20" fill="rgba(247,37,133,0.5)">☣</text>
  <!-- Lid -->
  <rect x="130" y="162" width="140" height="32" rx="8" fill="url(#lid)"/>
  <rect x="130" y="162" width="140" height="12" rx="8" fill="rgba(255,255,255,0.22)"/>
  <!-- Slot on lid -->
  <rect x="182" y="170" width="36" height="8" rx="4" fill="rgba(0,0,0,0.35)"/>
  <!-- Base -->
  <rect x="142" y="330" width="116" height="12" rx="4" fill="rgba(255,255,255,0.06)"/>
  <!-- Label text on container -->
  <text x="200" y="225" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="600" fill="rgba(255,255,255,0.4)" letter-spacing="2">SHARPS ONLY</text>
  <!-- Below -->
  <text x="200" y="395" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="600" letter-spacing="4" fill="#F72585" opacity="0.88">STAGE SAFE</text>
  <text x="200" y="415" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="rgba(255,255,255,0.38)" letter-spacing="2">TRAVEL SHARPS CONTAINER</text>
  <circle cx="128" cy="165" r="1.5" fill="#F72585" opacity="0.5"/>
  <circle cx="272" cy="148" r="1" fill="white" opacity="0.25"/>
  <circle cx="122" cy="320" r="1" fill="#ff6ba8" opacity="0.38"/>
</svg>
